<div class="visualization-header">
  <h2><i class="fas fa-eye"></i> 3D Visualization</h2>
  
  <div class="visualization-controls">
    <button (click)="toggleGrid()" [class.active]="isGridVisible" class="control-btn">
      <i class="fas fa-th"></i> Grid
    </button>
    <button (click)="toggleLabels()" [class.active]="areLabelsVisible" class="control-btn">
      <i class="fas fa-tag"></i> Labels
    </button>
    <button (click)="toggleWalls()" [class.active]="areWallsVisible" class="control-btn">
      <i class="fas fa-cube"></i> Walls
    </button>
  </div>
</div>

<div class="viewer-container">
  <div id="3d-container" #rendererContainer></div>

  <div *ngIf="isLoading" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>Generating 3D Layout...</p>
  </div>

  <div *ngIf="!hasLayout && !isLoading" class="no-layout-message">
    <i class="fas fa-warehouse"></i>
    <h3>No Warehouse Layout Generated</h3>
    <p>Configure dimensions on the left and click "GENERATE 3D LAYOUT"</p>
  </div>

  <div class="view-controls" *ngIf="hasLayout">
    <div class="view-group">
      <button (click)="zoomIn()" class="view-btn" title="Zoom In">
        <i class="fas fa-search-plus"></i>
      </button>
      <button (click)="zoomOut()" class="view-btn" title="Zoom Out">
        <i class="fas fa-search-minus"></i>
      </button>
    </div>

    <div class="view-group">
      <button (click)="resetView()" class="view-btn" title="Reset Camera">
        <i class="fas fa-sync-alt"></i>
      </button>
    </div>

    <div class="view-group">
      <button (click)="setTopView()" class="view-btn" title="Top View">
        <i class="fas fa-arrow-down"></i> Top
      </button>
      <button (click)="setFrontView()" class="view-btn" title="Front View">
        <i class="fas fa-arrow-right"></i> Front
      </button>
      <button (click)="setSideView()" class="view-btn" title="Side View">
        <i class="fas fa-arrow-left"></i> Side
      </button>
    </div>
  </div>

  <div class="legend" *ngIf="hasLayout">
    <h3><i class="fas fa-palette"></i> Legend</h3>
    <div class="legend-items">
      <div class="legend-item">
        <span class="color-box" style="background-color: #ff6b6b"></span>
        <span>Block 1</span>
      </div>
      <div class="legend-item">
        <span class="color-box" style="background-color: #4ecdc4"></span>
        <span>Block 2</span>
      </div>
      <div class="legend-item">
        <span class="color-box" style="background-color: #8b4513"></span>
        <span>Wooden Pallet</span>
      </div>
      <div class="legend-item">
        <span class="color-box" style="background-color: #1e90ff"></span>
        <span>Plastic Pallet</span>
      </div>
    </div>
  </div>
</div>
